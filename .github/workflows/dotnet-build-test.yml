name: .NET Build & Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: List files to debug
      run: |
        ls -la
        echo "---"
        ls -la PROG7311-POE/

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore PROG7311-POE/PROG7311-POE.slnx

    - name: Build solution
      run: dotnet build PROG7311-POE/PROG7311-POE.slnx --no-restore --configuration Release

    - name: Run unit tests
      run: dotnet test PROG7311-POE/PROG7311-POE.slnx --no-build --configuration Release --verbosity normal
